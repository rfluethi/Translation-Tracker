name: Build & Release ZIP

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.4-beta) — only used for the release note, not the filename'
        required: false
        default: ''
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare plugin directory
        run: |
          git archive --format=tar --prefix=wp-translation-tracker/ HEAD:plugin \
            | tar -xf - -C /tmp

      - name: Upload ZIP as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: translation-tracker
          path: /tmp/wp-translation-tracker
          retention-days: 30

      - name: Build ZIP for release
        if: github.event_name == 'release'
        run: |
          git archive --format=zip --prefix=wp-translation-tracker/ HEAD:plugin \
            -o translation-tracker.zip

      - name: Attach ZIP to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: translation-tracker.zip
