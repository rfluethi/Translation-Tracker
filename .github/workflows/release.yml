cat <<EOF > .github/workflows/release.yml
name: Build & Release ZIP

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.4-beta) — only used for the release note, not the filename'
        required: false
        default: ''
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Package Plugin
        run: |
          # Erstelle einen temporären Ordner für das Plugin-Paket
          mkdir -p build/wp-translation-plugin
          
          # Kopiere alle Dateien (außer den build-Ordner selbst) in den Paket-Ordner
          # Wir nutzen rsync oder cp, um alles sauber zu kopieren
          cp -r . build/wp-translation-plugin
          
          # Entferne unnötige Dateien aus dem Paket (wie .git oder den build Ordner)
          rm -rf build/wp-translation-plugin/build
          rm -rf build/wp-translation-plugin/.git
          
          # Gehe in den build-Ordner und erstelle das ZIP
          cd build
          zip -r ../translation-plugin.zip wp-translation-plugin
          cd ..

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: translation-plugin-zip
          path: translation-plugin.zip

      - name: Release Asset
        # Dieser Schritt ist optional, falls du die Datei direkt im Release sehen willst
        run: |
          echo "Plugin ZIP created successfully."
EOF